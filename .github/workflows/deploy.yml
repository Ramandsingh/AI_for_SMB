name: Deploy to MBserver

on:
  push:
    branches:
      - claude/docker-react-vite-mysql-PeMvf
      - main

jobs:
  deploy:
    runs-on: self-hosted
    if: contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env
        run: |
          {
            echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "LAN_IP=${{ secrets.LAN_IP }}"
          } > .env

      - name: Build and restart app containers
        run: |
          # DOCKER_BUILDKIT=0 uses the legacy builder — skips Docker Hub registry
          # auth on every build. BuildKit contacts registry.docker.io even for
          # cached images, causing i/o timeout on restricted networks.
          DOCKER_BUILDKIT=0 docker compose build frontend backend
          docker compose up -d

      - name: Verify containers are running
        run: |
          echo "--- Container status ---"
          docker compose ps
          echo "--- Health check ---"
          sleep 10
          curl -sf http://localhost:3001 > /dev/null && echo "Frontend OK" || echo "Frontend not responding yet"
          curl -sf http://localhost:3001/api/health && echo "Backend OK" || echo "Backend not ready yet"
